{% extends 'base.html' %}

{% block title %}اشتراك - {{ course.title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="auth-card">
        <h2 class="fw-bold mb-4">طلب اشتراك في {{ course.title }}</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100">إرسال طلب الاشتراك</button>
        </form>
    </div>
</div>
{% endblock %}
