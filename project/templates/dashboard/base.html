{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}لوحة التحكم{% endblock %} | ماركو Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-2 col-md-3 dashboard-sidebar p-0">
                <div class="p-3 text-white text-center border-bottom border-secondary">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-speedometer2"></i> لوحة التحكم</h5>
                </div>
                <nav class="nav flex-column py-2">
                    <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'dashboard:home' %}"><i class="bi bi-house me-2"></i> الرئيسية</a>
                    <a class="nav-link {% if 'users' in request.path %}active{% endif %}" href="{% url 'dashboard:users_list' %}"><i class="bi bi-people me-2"></i> المستخدمون</a>
                    <a class="nav-link {% if '/courses' in request.path %}active{% endif %}" href="{% url 'dashboard:courses_list' %}"><i class="bi bi-book me-2"></i> الكورسات</a>
                    <a class="nav-link {% if 'subscriptions' in request.path %}active{% endif %}" href="{% url 'dashboard:subscriptions_list' %}"><i class="bi bi-credit-card me-2"></i> الاشتراكات</a>
                    <a class="nav-link {% if 'certificates' in request.path %}active{% endif %}" href="{% url 'dashboard:certificates_list' %}"><i class="bi bi-award me-2"></i> الشهادات</a>
                    <a class="nav-link {% if 'contact-messages' in request.path %}active{% endif %}" href="{% url 'dashboard:contact_messages' %}"><i class="bi bi-envelope me-2"></i> رسائل التواصل</a>
                    <hr class="border-secondary mx-3">
                    <a class="nav-link" href="{% url 'pages:home' %}"><i class="bi bi-globe me-2"></i> الموقع</a>
                    <a class="nav-link" href="{% url 'admin:index' %}"><i class="bi bi-gear me-2"></i> Django Admin</a>
                </nav>
            </div>
            <div class="col-lg-10 col-md-9 p-4">
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
                {% endfor %}
                {% endif %}
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
